# Amplifier Notify Bundle
# Desktop notifications for turn completion events
#
# This bundle provides:
# - hooks-notify module: Desktop notifications on orchestrator:complete
# - notify-expert agent: Consultation for notification configuration
# - desktop-notifications behavior: Ready-to-use notification setup
#
# Usage:
#   Include in your bundle to add notification support:
#
#   includes:
#     - notify
#
#   Or compose the behavior directly:
#
#   behaviors:
#     - notify:desktop-notifications

name: notify
version: 0.1.0
description: Desktop notifications when assistant turns complete

# Hooks provided by this bundle
hooks:
  - hooks-notify

# Agents provided by this bundle
agents:
  - notify-expert

# Behaviors provided by this bundle
behaviors:
  - desktop-notifications

# Default configuration
config:
  hooks:
    notify:
      enabled: true
      title: "Amplifier"
      min_iterations: 1
      show_iteration_count: true
      sound: false
