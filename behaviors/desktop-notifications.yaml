# Desktop Notifications Behavior
# Enables native desktop notifications when assistant turns complete

name: desktop-notifications
description: |
  Adds desktop notification support for turn completion events.
  Supports macOS, Linux, and Windows/WSL platforms.

hooks:
  - hooks-notify

# Default configuration for the hooks-notify module
config:
  hooks:
    notify:
      enabled: true
      title: "Amplifier"
      min_iterations: 1
      show_iteration_count: true
      sound: false

context:
  include:
    - notify:context/NOTIFICATIONS.md
